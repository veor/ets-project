<h2 mat-dialog-title>Add New Department</h2>
<mat-dialog-content>
  <mat-form-field appearance="outline" class="w-100 mb-3">
    <mat-label>Department Name</mat-label>
    <input matInput [(ngModel)]="officeName" placeholder="Enter full department name">
  </mat-form-field>

  <mat-form-field appearance="outline" class="w-100">
    <mat-label>Department Acronym</mat-label>
    <input matInput [(ngModel)]="officeValue" placeholder="Enter acronym">
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="close()" [disabled]="saving">Cancel</button>
  <button mat-raised-button color="primary" (click)="addDepartment()" [disabled]="saving">
    {{ saving ? 'Adding...' : 'Save' }}
  </button>
</mat-dialog-actions>
