<h2 mat-dialog-title>Change Password</h2>

<mat-dialog-content>
  <form [formGroup]="passwordForm">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Current Password</mat-label>
      <input 
        matInput 
        [type]="showCurrentPassword ? 'text' : 'password'"
        formControlName="currentPassword"
        placeholder="Enter current password">
      <button 
        mat-icon-button 
        matSuffix 
        type="button"
        (click)="showCurrentPassword = !showCurrentPassword">
        <mat-icon>{{ showCurrentPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
      <mat-error *ngIf="passwordForm.get('currentPassword')?.hasError('required')">
        Current password is required
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>New Password</mat-label>
      <input 
        matInput 
        [type]="showNewPassword ? 'text' : 'password'"
        formControlName="newPassword"
        placeholder="Enter new password">
      <button 
        mat-icon-button 
        matSuffix 
        type="button"
        (click)="showNewPassword = !showNewPassword">
        <mat-icon>{{ showNewPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
      <mat-error *ngIf="passwordForm.get('newPassword')?.hasError('required')">
        New password is required
      </mat-error>
      <mat-error *ngIf="passwordForm.get('newPassword')?.hasError('minlength')">
        Password must be at least 6 characters
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Confirm New Password</mat-label>
      <input 
        matInput 
        [type]="showConfirmPassword ? 'text' : 'password'"
        formControlName="confirmPassword"
        placeholder="Re-enter new password">
      <button 
        mat-icon-button 
        matSuffix 
        type="button"
        (click)="showConfirmPassword = !showConfirmPassword">
        <mat-icon>{{ showConfirmPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
      <mat-error *ngIf="passwordForm.get('confirmPassword')?.hasError('required')">
        Please confirm your password
      </mat-error>
      <mat-error *ngIf="passwordForm.get('confirmPassword')?.hasError('passwordMismatch')">
        Passwords do not match
      </mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="closeDialog()">Cancel</button>
  <button 
    mat-raised-button 
    color="primary" 
    (click)="changePassword()"
    [disabled]="isChangingPassword || passwordForm.invalid">
    <mat-spinner *ngIf="isChangingPassword" diameter="20" class="inline-spinner"></mat-spinner>
    {{ isChangingPassword ? 'Processing...' : 'Change Password' }}
  </button>
</mat-dialog-actions>
