<h2 mat-dialog-title>Cancel Request</h2>
<mat-dialog-content>Are you sure you want to cancel this request?</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="dialogRef.close(false)">No</button>
  <button mat-button color="warn" (click)="dialogRef.close(true)">Yes, Cancel</button>
</mat-dialog-actions>
